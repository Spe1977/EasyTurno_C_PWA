<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyTurno</title>

    <!-- Security: Content Security Policy (development) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.googleusercontent.com; connect-src 'self' ws: wss: https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com; frame-src https://*.firebaseapp.com https://accounts.google.com; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none';"
    />

    <!-- PWA Meta Tags -->
    <meta
      name="description"
      content="A complete and intuitive PWA for managing single and recurring work shifts."
    />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="48x48" href="favicon.png" />

    <!-- iOS PWA Meta Tags -->
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial,
          sans-serif;
      }

      /* Custom scrollbar for dark mode */
      .dark ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      .dark ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      .dark ::-webkit-scrollbar-thumb {
        background-color: #64748b;
        border-radius: 6px;
        border: 3px solid #0f172a;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background-color: #94a3b8;
      }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-900">
    <app-root></app-root>
  </body>
</html>
