version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    # Group Angular updates together
    groups:
      angular:
        patterns:
          - "@angular/*"
      capacitor:
        patterns:
          - "@capacitor/*"
      testing:
        patterns:
          - "jest*"
          - "@jest/*"
          - "cypress"
          - "@cypress/*"
          - "@testing-library/*"
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "prettier"
          - "@typescript-eslint/*"
